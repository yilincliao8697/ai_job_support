<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Job Support{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    // Apply saved theme before paint to avoid flash
    (function() {
      const t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();

    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = next === 'dark' ? '☀' : '☽';
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  <header>
    <a href="/" class="logo">AI Job Support</a>
    <nav>
      <span class="nav-dropdown">
        <button class="nav-dropdown-toggle" onclick="toggleDropdown(this, event)" type="button">
          Apply <span class="nav-dropdown-arrow">▾</span>
        </button>
        <span class="nav-dropdown-menu">
          <a href="/apply/start">Start application</a>
          <a href="/applications">Applications</a>
          <a href="/resume">Resume</a>
          <a href="/cover-letter">Cover Letter</a>
          <a href="/cv/edit">CV</a>
        </span>
      </span>
      <span class="nav-dropdown">
        <button class="nav-dropdown-toggle" onclick="toggleDropdown(this, event)" type="button">
          Research <span class="nav-dropdown-arrow">▾</span>
        </button>
        <span class="nav-dropdown-menu">
          <a href="/intelligence">Intelligence</a>
          <a href="/companies">Companies</a>
        </span>
      </span>
      <a href="/linkedin">Post</a>
      <a href="/encouragement">Boost</a>
      <a href="/settings">Settings</a>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">☽</button>
    </nav>
  </header>
  <script>
    // Sync button label to current theme after DOM is ready
    document.getElementById('theme-toggle').textContent =
      document.documentElement.getAttribute('data-theme') === 'dark' ? '☀' : '☽';

    function toggleDropdown(btn, event) {
      event.stopPropagation();
      const dropdown = btn.closest('.nav-dropdown');
      const isOpen = dropdown.classList.contains('open');
      // Close all open dropdowns first
      document.querySelectorAll('.nav-dropdown.open').forEach(function(d) {
        d.classList.remove('open');
        d.querySelector('.nav-dropdown-arrow').textContent = '▾';
      });
      // Toggle the clicked one
      if (!isOpen) {
        dropdown.classList.add('open');
        btn.querySelector('.nav-dropdown-arrow').textContent = '▴';
      }
    }

    // Close dropdowns when clicking outside
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.nav-dropdown')) {
        document.querySelectorAll('.nav-dropdown.open').forEach(function(d) {
          d.classList.remove('open');
          d.querySelector('.nav-dropdown-arrow').textContent = '▾';
        });
      }
    });
  </script>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
