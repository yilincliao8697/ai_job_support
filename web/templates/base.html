<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Job Support{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    // Apply saved theme before paint to avoid flash
    (function() {
      const t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();

    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = next === 'dark' ? '☀' : '☽';
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  <header>
    <a href="/" class="logo">AI Job Support</a>
    <nav>
      <span class="nav-dropdown">
        <a href="/applications">Apply</a>
        <span class="nav-dropdown-menu">
          <a href="/applications">Applications</a>
          <a href="/resume">Resume</a>
          <a href="/cover-letter">Cover Letter</a>
          <a href="/cv/edit">CV</a>
        </span>
      </span>
      <span class="nav-dropdown">
        <a href="/intelligence">Research</a>
        <span class="nav-dropdown-menu">
          <a href="/intelligence">Intelligence</a>
          <a href="/companies">Companies</a>
        </span>
      </span>
      <a href="/linkedin">Post</a>
      <a href="/encouragement">Boost</a>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">☽</button>
    </nav>
  </header>
  <script>
    // Sync button label to current theme after DOM is ready
    document.getElementById('theme-toggle').textContent =
      document.documentElement.getAttribute('data-theme') === 'dark' ? '☀' : '☽';
  </script>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
