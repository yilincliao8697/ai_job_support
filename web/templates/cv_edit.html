{% extends "base.html" %}

{% block title %}Edit CV{% endblock %}

{% block content %}
<h1>Edit Master CV</h1>
<p class="text-muted" style="margin-top: 0.25rem; margin-bottom: 2rem;">
  Raw YAML. Changes affect resume generation and LinkedIn posts immediately.
</p>

{% if error %}
<div style="background: #fff0f0; border: 1px solid #f5c6cb; border-radius: 6px;
            padding: 0.75rem 1rem; margin-bottom: 1.5rem; color: #c0392b; font-size: 0.9rem;">
  <strong>YAML error — file not saved.</strong><br>{{ error }}
</div>
{% endif %}

{% if saved %}
<div style="background: #f0fff4; border: 1px solid #b2dfdb; border-radius: 6px;
            padding: 0.75rem 1rem; margin-bottom: 1.5rem; color: #27ae60; font-size: 0.9rem;">
  Saved.
</div>
{% endif %}

<form method="post" action="/cv/save" id="cv-form">
  <textarea id="cv-content" name="content" style="display: none;">{{ content }}</textarea>
  <div id="editor" style="border: 1px solid #ddd; border-radius: 6px;"></div>
  <div style="margin-top: 1rem;">
    <button type="submit" class="btn btn-primary">Save</button>
  </div>
</form>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/idea.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/yaml/yaml.min.js"></script>
<script>
  const editor = CodeMirror(document.getElementById('editor'), {
    value: document.getElementById('cv-content').value,
    mode: 'yaml',
    theme: 'idea',
    lineNumbers: true,
    indentWithTabs: false,
    tabSize: 2,
    lineWrapping: true,
    extraKeys: { Tab: cm => cm.execCommand('insertSoftTab') },
  });

  editor.setSize('100%', '600px');

  document.getElementById('cv-form').addEventListener('submit', () => {
    document.getElementById('cv-content').value = editor.getValue();
  });
</script>
{% endblock %}
