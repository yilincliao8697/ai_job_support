{% extends "base.html" %}

{% block title %}LinkedIn Posts{% endblock %}

{% block content %}
<h1>LinkedIn Post Generator</h1>
<p class="text-muted" style="margin-top: 0.25rem; margin-bottom: 2rem;">
  Pick a direction. Get three posts. Copy one and go.
</p>

<form id="linkedin-form"
      hx-post="/linkedin/generate"
      hx-target="#linkedin-posts"
      hx-swap="innerHTML">

  <fieldset style="border: none; padding: 0; margin: 0 0 1.5rem;">
    <legend style="font-weight: 600; margin-bottom: 0.75rem;">Category</legend>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.5rem;">
      {% for key, label in categories.items() %}
      <label class="category-tile" style="display: flex; align-items: center; gap: 0.5rem;
                    padding: 0.6rem 0.75rem; border: 1px solid #ddd; border-radius: 6px;
                    cursor: pointer; transition: border-color 0.15s, background 0.15s;">
        <input type="radio" name="category" value="{{ key }}"
               {% if key == "tech_tool" %}checked{% endif %}
               style="margin: 0;">
        {{ label }}
      </label>
      {% endfor %}
    </div>
  </fieldset>

  <div style="margin-bottom: 1rem;">
    <label for="topic" style="font-weight: 600;">What specifically?</label>
    <input type="text" id="topic" name="topic"
           placeholder="e.g. using Claude Code to refactor legacy Python, or AI in grid management"
           style="width: 100%; margin-top: 0.4rem;">
  </div>

  <div style="margin-bottom: 1rem;">
    <label for="url" style="font-weight: 600;">
      Source URL
      <span style="font-weight: 400; color: #888;">(optional — paste a paper or blog post link)</span>
    </label>
    <input type="text" id="url" name="url"
           placeholder="https://..."
           style="width: 100%; margin-top: 0.4rem;">
  </div>

  <div style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem;">
    <label for="tone" style="font-weight: 600; white-space: nowrap;">Tone</label>
    <select id="tone" name="tone" style="min-width: 200px;">
      {% for key, label in tones.items() %}
      <option value="{{ key }}" {% if key == "insightful" %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <button id="generate-btn" type="submit" class="btn btn-primary" style="min-width: 160px;">
    Generate posts
  </button>
</form>

<div id="linkedin-posts" style="margin-top: 2.5rem;"></div>

<script>
function copyPost(slotIndex) {
  const textarea = document.getElementById('post-text-' + slotIndex);
  navigator.clipboard.writeText(textarea.value).then(() => {
    const indicator = document.getElementById('copied-' + slotIndex);
    indicator.style.display = 'inline';
    setTimeout(() => { indicator.style.display = 'none'; }, 2000);
  });
}

// Highlight selected category tile
document.querySelectorAll('input[name="category"]').forEach(radio => {
  function updateTiles() {
    document.querySelectorAll('input[name="category"]').forEach(r => {
      r.closest('label').style.borderColor = r.checked ? '#4a6cf7' : '#ddd';
      r.closest('label').style.background = r.checked ? '#f0f4ff' : '';
    });
  }
  radio.addEventListener('change', updateTiles);
  if (radio.checked) updateTiles();
});

// Disable button while generating
document.getElementById('linkedin-form').addEventListener('htmx:beforeRequest', () => {
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';
});
document.body.addEventListener('htmx:afterRequest', (e) => {
  if (e.detail.elt.id === 'linkedin-form') {
    const btn = document.getElementById('generate-btn');
    btn.disabled = false;
    btn.textContent = 'Generate posts';
  }
});
</script>
{% endblock %}
