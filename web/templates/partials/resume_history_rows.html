{% for record in resumes %}
<tr id="resume-row-{{ record.id }}">
  <td>{{ record.company }}</td>
  <td>{{ record.role }}</td>
  <td>{{ record.generated_at[:10] }}</td>
  <td>{% if record.application_id %}Linked{% else %}—{% endif %}</td>
  <td>
    <div style="display: flex; gap: 0.4rem; align-items: center; flex-wrap: nowrap;">
      <a href="/resume/download/{{ record.filename }}" class="btn btn-secondary" style="font-size: 0.8rem; padding: 0.25rem 0.6rem;" download>Download</a>
      <button class="btn btn-secondary"
              style="font-size: 0.8rem; padding: 0.25rem 0.6rem;"
              hx-get="/resume/preview-frame/{{ record.filename }}"
              hx-target="#preview-{{ record.id }}"
              hx-swap="innerHTML">Preview</button>
      {% if record.tailored_json %}
      <a href="/resume/{{ record.id }}/edit" class="btn btn-secondary" style="font-size: 0.8rem; padding: 0.25rem 0.6rem;">Edit</a>
      {% elif record.job_description %}
      <a href="/resume/{{ record.id }}/edit" class="btn btn-secondary" style="font-size: 0.8rem; padding: 0.25rem 0.6rem;">Revise</a>
      {% else %}
      <span style="display: inline-block; width: 3.2rem;"></span>
      {% endif %}
      <button class="btn btn-danger"
              style="font-size: 0.8rem; padding: 0.25rem 0.6rem;"
              hx-post="/resume/history/{{ record.id }}/delete"
              hx-target="#resume-history-rows"
              hx-swap="innerHTML"
              hx-confirm="Remove this record? The PDF file is not deleted.">Delete</button>
    </div>
  </td>
</tr>
<tr>
  <td colspan="5" id="preview-{{ record.id }}" style="padding: 0; border: none;"></td>
</tr>
{% endfor %}
